 <!DOCTYPE html>
<html>
<head>
<title>【Artificial Wings 人造機械之翼】Alpha版測試序號領取處</title>
 <style>
  body, html {
    height: 100%;
    margin: 0;
  }
  #forms {
    height: calc(100% - 50px); /* iframe的高度為整頁的100%減去上面元素的高度 */
    width: 100%;
  }
  iframe {
    height: 100%;
    width: 100%;
  }
</style>
<script>
// AJAX 請求更新序號數量的函數
function updateSerialNumbers() {
  var request = new XMLHttpRequest();
  request.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      var responseText = this.responseText;
      // 更新剩餘序號數量顯示
      document.getElementById("remaining-codes").innerText = responseText;

      // 檢查剩餘序號數量
      var remaining = responseText.match(/剩餘(\d+)組/);
      if (remaining && parseInt(remaining[1]) === 0) {
        // 如果剩餘序號數量為0，隱藏或移除iframe
        document.getElementById("forms").style.display = "none";
        
// 檢查是否已有提示信息元素
        var existingMessage = document.getElementById("no-more-codes-message");
        if (!existingMessage) {
          // 創建並插入新的提示信息元素
          var message = document.createElement("p");
          message.setAttribute("id", "no-more-codes-message");
          message.style.textAlign = "center";
          message.innerText = "目前所有序號已經發放完畢，請等候後續開放";
          document.body.insertBefore(message, document.getElementById("remaining-codes").nextSibling);
        } else {
          // 更新已有的提示信息元素文本
          existingMessage.innerText = "目前所有序號已經發放完畢，請等候後續開放";
        }
      } else {
        // 如果剩餘序號數量不為0，確保iframe顯示
        document.getElementById("forms").style.display = "block";

        // 如果有提示信息元素，移除它
        var existingMessage = document.getElementById("no-more-codes-message");
        if (existingMessage) {
          existingMessage.remove();
        }
      }     
    }
  };
  // 替換 YOUR_WEB_APP_URL 為您的Web應用URL
  request.open("GET", "https://script.google.com/macros/s/AKfycbxYW_Ad2mGOpTLqr4qoN-0sUb0xHVnDZaJxu1eOdDsLalhOt1o2-wKjvoHrRXc49lU-/exec", true);
  request.send();
}

// 页面加载时执行
window.onload = function() {
  updateSerialNumbers(); // 页面加载完成时立即更新
  setInterval(updateSerialNumbers, 3000); // 之后每3秒更新一次
};
  
</script>
</head>
<body>
<h3 style="margin:0; padding: 10px 0; text-align: center;">剩餘序號數量</h3>
<div id="remaining-codes" style="text-align: center;">加載中...</div>
<div id="forms">  
<iframe frameBorder="0" src="https://forms.gle/WxhnPEUqFNiFx7qs6"></iframe>
</div>
 
</body>
</html>
