 <!DOCTYPE html>
<html>
<head>
<title>序號剩餘數量</title>
 <style>
  body, html {
    height: 100%;
    margin: 0;
  }
  #forms {
    height: calc(100% - 50px); /* iframe的高度為整頁的100%減去上面元素的高度 */
    width: 100%;
    overflow: hidden;
  }
  iframe {
    height: 100%;
    width: 100%;
  }
</style>
<script>
// AJAX 請求更新序號數量的函數
function updateSerialNumbers() {
  var request = new XMLHttpRequest();
  request.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      // 當請求成功時更新網頁元素
      document.getElementById("remaining-codes").innerText = this.responseText;
    }
  };
  // 替換 YOUR_WEB_APP_URL 為您的Web應用URL
  request.open("GET", "https://script.google.com/macros/s/AKfycbxYW_Ad2mGOpTLqr4qoN-0sUb0xHVnDZaJxu1eOdDsLalhOt1o2-wKjvoHrRXc49lU-/exec", true);
  request.send();
}

// 页面加载时执行
window.onload = function() {
  updateSerialNumbers(); // 页面加载完成时立即更新
  setInterval(updateSerialNumbers, 3000); // 之后每3秒更新一次
};
  
</script>
</head>
<body>
<h3 style="margin:0; padding: 10px 0; text-align: center;">剩餘序號數量</h3>
<div id="remaining-codes" style="text-align: center;">加載中...</div>
<div id="forms">  
<iframe frameBorder="0" src="https://forms.gle/WxhnPEUqFNiFx7qs6"></iframe>
</div>
 
</body>
</html>
